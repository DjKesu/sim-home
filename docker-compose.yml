version: '3.8'

services:
  # Isaac Sim service with GPU support
  isaac-sim:
    image: nvcr.io/nvidia/isaac-sim:4.0.0
    container_name: isaac-sim
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker.xauth
      - ISAAC_SIM=/isaac-sim
    volumes:
      # X11 forwarding for GUI
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      # Data persistence
      - ./data:/isaac-sim/data:rw
      - ./cache:/isaac-sim/cache:rw
      - ./workspace:/workspace:rw
    ports:
      - "8080:8080"  # Web interface
      - "8888:8888"  # Jupyter notebook
      - "6006:6006"  # TensorBoard
    network_mode: host
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Custom Isaac Sim with additional tools (if using custom Dockerfile)
  isaac-sim-custom:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: isaac-sim-custom
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - DISPLAY=${DISPLAY}
      - QT_X11_NO_MITSHM=1
      - XAUTHORITY=/tmp/.docker.xauth
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /tmp/.docker.xauth:/tmp/.docker.xauth:rw
      - ./data:/isaac-sim/data:rw
      - ./cache:/isaac-sim/cache:rw
      - ./workspace:/workspace:rw
    ports:
      - "8080:8080"
      - "8888:8888"
      - "6006:6006"
    network_mode: host
    stdin_open: true
    tty: true
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

  # Headless Isaac Sim service for batch processing
  isaac-sim-headless:
    image: nvcr.io/nvidia/isaac-sim:4.0.0
    container_name: isaac-sim-headless
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all
      - ISAAC_SIM=/isaac-sim
    volumes:
      - ./data:/isaac-sim/data:rw
      - ./cache:/isaac-sim/cache:rw
      - ./workspace:/workspace:rw
    command: ["./isaac-sim.headless.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]